name: Crear Bitácoras Académicas

on:
  schedule:
    # Cada 4 horas (00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC)
    # En Bogotá (UTC-5): 19:00, 23:00, 03:00, 07:00, 11:00, 15:00
    - cron: '0 */4 * * *'

  # Permite ejecución manual desde la pestaña Actions
  workflow_dispatch:

# Solo una ejecución a la vez (evita condiciones de carrera)
concurrency:
  group: crear-bitacoras
  cancel-in-progress: false

jobs:
  crear-bitacoras:
    name: Procesar nuevos estudiantes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.claude/skills/bitacoras-academicas/requirements.txt'

      - name: Instalar dependencias
        working-directory: .claude/skills/bitacoras-academicas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear archivo de credenciales Google desde Secret
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > /tmp/google-credentials.json
          # Validar que es un JSON válido antes de continuar
          python -c "import json; json.load(open('/tmp/google-credentials.json'))" \
            || { echo "::error::GOOGLE_CREDENTIALS_JSON no es JSON válido"; exit 1; }
          echo "✓ Credenciales escritas y validadas"

      - name: Ejecutar script de creación de bitácoras
        env:
          # GHL
          GHL_API_KEY:                          ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID:                      ${{ secrets.GHL_LOCATION_ID }}
          GHL_FIELD_ID_PROMOCION:               ${{ secrets.GHL_FIELD_ID_PROMOCION }}
          GHL_FIELD_ID_NIVEL:                   ${{ secrets.GHL_FIELD_ID_NIVEL }}
          GHL_FIELD_ID_BITACORA_URL:            ${{ secrets.GHL_FIELD_ID_BITACORA_URL }}
          # Drive
          BITACORAS_ROOT_ID:                    ${{ secrets.BITACORAS_ROOT_ID }}
          GOOGLE_CREDENTIALS_PATH:              /tmp/google-credentials.json
        working-directory: .claude/skills/bitacoras-academicas
        run: |
          python scripts/crear_bitacoras.py

      - name: Subir log como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bitacoras-log-${{ github.run_id }}
          path: .claude/skills/bitacoras-academicas/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Limpiar credenciales
        if: always()
        run: |
          rm -f /tmp/google-credentials.json
          echo "✓ Credenciales eliminadas del runner"
